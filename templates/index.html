<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breast Cancer Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Optional custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container py-5">

        <h1 class="text-center mb-4">Breast Cancer Detection</h1>
        <h4 class="text-center mb-4">Upload MRI Scan Image</h4>

        <!-- Upload Form -->
        <form action="/predict" method="POST" enctype="multipart/form-data" class="mb-4">
            <div class="mb-3">
                <input type="file" class="form-control" name="image" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Upload & Detect</button>
        </form>

        <!-- Success Message -->
        {% if message %}
        <div class="alert alert-success text-center">
            {{ message }}
        </div>
        {% endif %}

        <!-- Output Image -->
        {% if output_image %}
        <div class="text-center mt-4">
            <img src="{{ output_image }}" class="img-fluid rounded border" alt="Detected Image">
        </div>
        {% endif %}

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
